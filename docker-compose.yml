services:
  backend:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    ports:
      - "8501:8000"
    env_file:
      - .env
    environment:
      - HCLOUD_TOKEN
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8501
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - DEFAULT_AI_PROVIDER
      - DEFAULT_AI_MODEL
      - DOCKER_MONITOR_KEY=/root/.ssh/hetzner_key
      - DOCKER_MONITOR_SERVERS
    volumes:
      - ./web/backend/app:/app/app
      - ./src:/app/src
      - ./.env:/app/.env
      - ~/.ssh/hetzner_key:/root/.ssh/hetzner_key:ro
    networks:
      - hetzner-network
    restart: unless-stopped

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
      target: build
    ports:
      - "8502:5173"
    volumes:
      - ./web/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8501
    command: npm run dev
    networks:
      - hetzner-network
    depends_on:
      - backend

networks:
  hetzner-network:
    driver: bridge
